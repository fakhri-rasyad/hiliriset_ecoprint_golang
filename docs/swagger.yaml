basePath: /
definitions:
  models.CreateEspRequest:
    properties:
      mac_address:
        type: string
    required:
    - mac_address
    type: object
  models.EspBase:
    properties:
      created_at:
        type: string
      deleted_at:
        type: string
      device_status:
        type: string
      internal_id:
        type: integer
      mac_address:
        type: string
      public_id:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  models.KomporBase:
    properties:
      created_at:
        type: string
      deleted_at:
        type: string
      internal_id:
        type: integer
      kompor_name:
        type: string
      public_id:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  models.KomporRequest:
    properties:
      kompor_name:
        type: string
    required:
    - kompor_name
    type: object
  models.UserDataResponse:
    properties:
      email:
        type: string
      role:
        type: string
      username:
        type: string
    type: object
  models.UserGorm:
    properties:
      created_at:
        type: string
      email:
        type: string
      internal_id:
        type: integer
      public_id:
        type: string
      role:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  models.UserLoginResponse:
    properties:
      token:
        type: string
      username:
        type: string
    type: object
  utils.Response:
    properties:
      data: {}
      error:
        type: string
      message:
        type: string
      status:
        type: string
      statusCode:
        type: integer
    type: object
externalDocs:
  description: OpenAPI
  url: https://swagger.io/resources/open-api/
host: localhost:3000
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is a sample server celler server.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Swagger Example API
  version: "1.0"
paths:
  /api/v1/esps:
    get:
      description: Endpoint untuk mengambil daftar esps pengguna
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.EspBase'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - ApiKeyAuth: []
      summary: GetEsps
      tags:
      - Esps
    post:
      consumes:
      - application/json
      description: Endpoint untuk menambahkan esp baru
      parameters:
      - description: Raw json body
        in: body
        name: esp
        required: true
        schema:
          $ref: '#/definitions/models.CreateEspRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.EspBase'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - ApiKeyAuth: []
      summary: CreateEsp
      tags:
      - Esps
  /api/v1/esps/{public_id}:
    delete:
      description: Endpoint untuk menghapus esp menggunakan public id
      parameters:
      - description: Public ID ESP
        in: path
        name: public_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - ApiKeyAuth: []
      summary: DeleteEsp
      tags:
      - Esps
    get:
      description: Endpoint untuk mengambil detail esp menggunakan public id
      parameters:
      - description: Public ID ESP
        in: path
        name: public_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.EspBase'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - ApiKeyAuth: []
      summary: GetEspByPublicID
      tags:
      - Esps
  /api/v1/kompors:
    get:
      description: Mengembalikan daftar kompor pengguna
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.KomporBase'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - ApiKeyAuth: []
      summary: GetKompors
      tags:
      - Kompors
    post:
      consumes:
      - application/json
      description: Menambahkan kompor pengguna
      parameters:
      - description: Raw json kompor data
        in: body
        name: kompor
        required: true
        schema:
          $ref: '#/definitions/models.KomporRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.KomporBase'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - ApiKeyAuth: []
      summary: AddKompor
      tags:
      - Kompors
  /api/v1/kompors/{public_id}:
    delete:
      description: Menghapus kompor berdasarkan public id
      parameters:
      - description: Public ID Kompor
        in: path
        name: public_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - ApiKeyAuth: []
      summary: DeleteKompor
      tags:
      - Kompors
    get:
      description: Mengambil detail kompor berdasarkan public id
      parameters:
      - description: Public ID Kompor
        in: path
        name: public_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.KomporBase'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - ApiKeyAuth: []
      summary: GetKomporByPublicID
      tags:
      - Kompors
  /v1/auth/login:
    post:
      consumes:
      - application/json
      description: Endpoint untuk authentikasi dan verifikasi user
      parameters:
      - description: Raw user json data
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/models.UserGorm'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.UserLoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Login user
      tags:
      - Users
  /v1/auth/register:
    post:
      consumes:
      - application/json
      description: Endpoint untuk mendaftarkan akun user ke sistem
      parameters:
      - description: Raw User Json Data
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/models.UserGorm'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.UserDataResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Register akun user
      tags:
      - Users
securityDefinitions:
  ApiKeyAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
